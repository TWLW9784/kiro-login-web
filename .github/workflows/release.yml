name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: kiro-login-web-linux
            asset_name: kiro-login-web-linux-amd64
          - os: windows-latest
            artifact_name: kiro-login-web-windows
            asset_name: kiro-login-web-windows-amd64.exe
          - os: macos-latest
            artifact_name: kiro-login-web-macos
            asset_name: kiro-login-web-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile \
            --name "${{ matrix.artifact_name }}" \
            --add-data "templates:templates" \
            --hidden-import=playwright \
            --hidden-import=pyotp \
            --collect-all playwright \
            app.py

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile `
            --name "${{ matrix.artifact_name }}" `
            --add-data "templates;templates" `
            --hidden-import=playwright `
            --hidden-import=pyotp `
            --collect-all playwright `
            app.py

      - name: Rename artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv "${{ matrix.artifact_name }}.exe" "${{ matrix.asset_name }}"
          else
            mv "${{ matrix.artifact_name }}" "${{ matrix.asset_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Kiro 批量登录与凭据导出工具

            ## 下载
            - **Windows**: `kiro-login-web-windows-amd64.exe`
            - **Linux**: `kiro-login-web-linux-amd64`
            - **macOS (Apple Silicon)**: `kiro-login-web-macos-arm64`

            ## 使用
            1. 下载对应平台的可执行文件
            2. 运行后浏览器打开 http://localhost:7888
            3. 首次运行需要本机已安装 Chromium（程序会尝试自动下载）

            ## 功能
            - 两种登录：AWS IAM Identity Center 设备码 / Microsoft 365 组织 SSO
            - MFA 自动绑定与复用
            - 凭据导出（总 JSON / 拆分 ZIP / API Key / MFA / 账号密码）
            - 固定/随机密码模式、全角符号转半角
            - 客户空间隔离，登录 O(1) 查找索引（客户数再多也毫秒级）
            - 代理池（可持久化保存）+ 撞 captcha 自动换 IP
            - 排队调度、并行登录（默认 2 并发，可调）
            - 账号数据保留时长可自定义（默认 24 小时，5 分钟 ~ 7 天）

            完整变更见 [CHANGELOG.md](https://github.com/TWLW9784/kiro-login-web/blob/main/CHANGELOG.md)。
          files: artifacts/**/*
          draft: false
          prerelease: false
